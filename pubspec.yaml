name: fitness_freaks
description: "A fitness app with clean architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core UI & Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

  # State Management & Hooks
  hooks_riverpod: ^2.5.1
  # flutter_hooks: ^0.20.5 # Removed hook dependency

  # Functional Programming & Immutability
  fpdart: ^1.1.0
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.2

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1
  # sign_in_with_apple: ^5.0.0  # Commented out until Apple Sign-In is implemented

  # UI/Utils
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  image: ^4.1.7
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_cropper: ^9.0.0
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.3
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    
